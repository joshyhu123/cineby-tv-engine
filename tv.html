<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineby Smart TV Interface</title>
    <style>
        body, html { margin: 0; padding: 0; background: #0c0c0c; color: white; font-family: sans-serif; width: 100%; height: 100%; overflow-x: hidden; }
        header { padding: 20px; background: #121212; border-bottom: 2px solid #222; text-align: left; font-size: 28px; font-weight: bold; color: #ff3e3e; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; padding: 30px; }
        .movie-card { background: #161616; border: 3px solid #252525; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .movie-card:focus { border-color: #ff3e3e; background: #222; transform: scale(1.05); outline: none; }
        .movie-card h3 { font-size: 18px; margin: 12px 0 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .loader { font-size: 26px; color: #ff3e3e; text-align: center; margin-top: 20%; display: block; font-weight: bold; }
        video { width: 100%; height: 100%; display: none; position: absolute; top:0; left:0; background: black; z-index: 99999; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
</head>
<body>

    <header>CINEBY TV HUB</header>
    <div id="loadingNotification" class="loader">Fetching Real-Time Site Catalog...</div>
    <div id="catalogGrid" class="grid-container"></div>

    <video id="toshibaHardwarePlayer" controls autoplay></video>

    <script>
        const grid = document.getElementById('catalogGrid');
        const loader = document.getElementById('loadingNotification');
        const video = document.getElementById('toshibaHardwarePlayer');
        let playerModule = null;

        shaka.polyfill.installAll();
        if (shaka.Player.isBrowserSupported()) {
            playerModule = new shaka.Player(video);
            playerModule.configure({ streaming: { bufferBehind: 3, bufferingGoal: 8 } });
        }

        // 1. Automatically fetch the live layout catalogue from your Render Proxy on load
        fetch('https://cineby-tv-engine.onrender.com/api/home')
            .then(res => res.json())
            .then(data => {
                loader.style.display = 'none';
                if (data.success && data.results.length > 0) {
                    data.results.forEach((item, index) => {
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        card.tabIndex = 0; // Make focusable by remote navigation layout hooks
                        card.innerHTML = `<h3>${item.title}</h3>`;
                        
                        // Handle Remote Key OK Selection click
                        card.addEventListener('click', () => launchStream(item.path));
                        card.addEventListener('keydown', (e) => { if(e.keyCode === 13) launchStream(item.path); });

                        grid.appendChild(card);
                    });
                    // Highlight the first movie selection on load automatically
                    document.querySelector('.movie-card').focus();
                } else {
                    loader.innerText = "Failed to render catalog structure from site.";
                }
            }).catch(err => { loader.innerText = "Connection timeout linking to backend."; });

        function launchStream(path) {
            grid.style.display = 'none';
            loader.innerText = "Extracting Stream; Bypassing Hidden Site Overlays...";
            loader.style.display = 'block';

            fetch(`https://cineby-tv-engine.onrender.com/api/stream?path=${encodeURIComponent(path)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        loader.style.display = 'none';
                        video.style.display = 'block';
                        playerModule.load(data.m3u8Url).catch(err => systemReset());
                    } else { systemReset(); }
                }).catch(err => systemReset());
        }

        // TV Remote Back/Return Key Handling Array
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 8 || e.keyCode === 461) {
                if (video.style.display === 'block') {
                    e.preventDefault();
                    playerModule.unload();
                    video.style.display = 'none';
                    grid.style.display = 'grid';
                    loader.style.display = 'none';
                    document.querySelector('.movie-card').focus();
                }
            }
        });

        function systemReset() {
            alert("Playback link failed to parse safely.");
            video.style.display = 'none';
            grid.style.display = 'grid';
            loader.style.display = 'none';
        }
    </script>
</body>
</html>
